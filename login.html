<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Trampoline Park & Ninja Warrior Course</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    
    <style>
        :root {
            --auth-bg: #ffffff;
            --auth-text: var(--text-dark);
            --auth-input-bg: #f5f5f5;
            --auth-input-border: #ddd;
            --auth-input-text: #111;
        }

        body.dark-mode {
            --auth-bg: rgba(10, 10, 10, 0.9);
            --auth-text: #ffffff;
            --auth-input-bg: rgba(255, 255, 255, 0.05);
            --auth-input-border: rgba(255, 255, 255, 0.1);
            --auth-input-text: #ffffff;
        }

        body {
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            transition: var(--transition-smooth);
        }

        body.dark-mode {
            background: var(--bg-dark);
        }

        .auth-container {
            position: relative;
            background: var(--auth-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--auth-input-border);
            padding: 60px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            color: var(--auth-text);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease-out;
            transition: var(--transition-smooth);
        }

        body.dark-mode .auth-container {
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo img {
            width: 60px;
            margin: 0 auto 15px;
        }

        .auth-logo h2 {
            font-size: 1.8rem;
            color: var(--primary-blue);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        body.dark-mode .form-group label {
            color: #aaa;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--auth-input-border);
            background: var(--auth-input-bg);
            color: var(--auth-input-text);
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: var(--auth-bg);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .form-options a {
            color: var(--primary-orange);
        }

        .auth-btn {
            width: 100%;
            margin-bottom: 25px;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        body.dark-mode .auth-footer {
            color: #888;
        }

        .auth-footer a {
            color: var(--primary-blue);
            font-weight: 600;
        }

        /* Social Login Styling */
        .social-auth {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--auth-input-border);
            margin-bottom: 30px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            background: var(--auth-input-bg);
            border: 1px solid var(--auth-input-border);
            color: var(--auth-text);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .social-btn:hover {
            background: #eee;
            transform: translateY(-2px);
        }

        body.dark-mode .social-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #888;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--primary-blue);
        }

        .auth-page-actions {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            max-width: 500px;
            gap: 15px;
            margin-bottom: 15px;
            z-index: 1000;
        }

        @media (min-width: 768px) {
            .auth-page-actions {
                position: fixed;
                top: 30px;
                right: 30px;
                width: auto;
                max-width: none;
                margin-bottom: 0;
            }
        }

        .auth-page-actions .theme-switch {
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        body.dark-mode .auth-page-actions .theme-switch {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .auth-page-actions .theme-switch:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .auth-page-actions .theme-switch:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media screen and (max-width: 480px) {
            .auth-container {
                padding: 40px 20px;
            }
            .form-options {
                font-size: 0.8rem;
                white-space: nowrap;
                gap: 5px;
            }
            .auth-logo h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-page-actions">
        <button class="theme-switch theme-toggle">🌙</button>
        <button class="theme-switch rtl-toggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 17H4l4-4"></path><path d="M4 7h16l-4 4"></path></svg>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-bottom: 25px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M12 2l9 4.5v11L12 22l-9-4.5v-11L12 2z"></path>
                    <path d="M8 8h8"></path>
                    <path d="M12 8v8"></path>
                </svg>
                <span class="logo-text" style="font-size: 1.4rem; font-weight: 800; color: var(--primary-blue); font-family: var(--font-heading); text-transform: uppercase;">TRAMPOLINE</span>
            </a>
            <h2>WARRIOR LOGIN</h2>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="password-toggle" id="togglePassword">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
            </div>

            <div class="form-options">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" style="width: auto; margin: 0;"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Login to Dashboard</button>
            
            <div class="social-auth">
                <p style="text-align: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Or login with</p>
                <div class="social-grid">
                    <a href="#" class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </a>
                    <a href="#" class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.82-.779.883-1.454 2.311-1.273 3.687 1.35.104 2.714-.663 3.56-1.677z"/>
                        </svg>
                        Apple
                    </a>
                </div>
            </div>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign Up Free</a>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" aria-label="Back to Top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"></path></svg>
    </button>

    <script src="assets/js/main.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle icons
            if(type === 'text') {
                this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            } else {
                this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            }
        });
    </script>
</body>
</html>
