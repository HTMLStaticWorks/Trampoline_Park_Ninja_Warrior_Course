<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Trampoline Park & Ninja Warrior Course</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            color: white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo img {
            width: 60px;
            margin: 0 auto 15px;
        }

        .auth-logo h2 {
            font-size: 1.8rem;
            color: var(--primary-blue);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(255,255,255,0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .form-options a {
            color: var(--primary-orange);
        }

        .auth-btn {
            width: 100%;
            margin-bottom: 25px;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .auth-footer a {
            color: var(--primary-blue);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-bottom: 25px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M12 2l9 4.5v11L12 22l-9-4.5v-11L12 2z"></path>
                    <path d="M8 8h8"></path>
                    <path d="M12 8v8"></path>
                </svg>
                <span style="font-size: 1.4rem; font-weight: 800; color: var(--primary-blue); font-family: var(--font-heading); text-transform: uppercase;">TRAMPOLINE & NINJA</span>
            </a>
            <h2>WARRIOR LOGIN</h2>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" style="width: auto; margin: 0;"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Login to Dashboard</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign Up Free</a>
        </div>
    </div>

</body>
</html>
