<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Trampoline Park & Ninja Warrior Course</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }

        .auth-container {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 40px;
            width: 100%;
            max-width: 600px;
            color: white;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h2 {
            font-size: 1.8rem;
            color: var(--primary-blue);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .form-group input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .auth-btn {
            width: 100%;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .auth-footer a {
            color: var(--primary-blue);
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-bottom: 20px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00f2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path d="M12 2l9 4.5v11L12 22l-9-4.5v-11L12 2z"></path>
                    <path d="M8 8h8"></path>
                    <path d="M12 8v8"></path>
                </svg>
                <span style="font-size: 1.4rem; font-weight: 800; color: var(--primary-blue); font-family: var(--font-heading); text-transform: uppercase;">TRAMPOLINE & NINJA</span>
            </a>
            <h2>CREATE ACCOUNT</h2>
            <p style="color: #666; margin-top: 5px;">Join the elite ninja community today.</p>
        </div>

        <form action="dashboard.html">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="+1 234 567 890" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>

            <div style="margin: 20px 0;">
                <label style="display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: #888; cursor: pointer;">
                    <input type="checkbox" style="width: auto; margin-top: 4px;" required>
                    <span>I agree to the Terms of Service, Privacy Policy, and Safety Waiver agreements.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary auth-btn">Create Warrior Profile</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log In Here</a>
        </div>
    </div>

</body>
</html>
